{% extends 'sensors/base.html' %}
{% load static %}
{% block content %}
  <header class="page-header">
    <div class="title-left">
      <h1>趙翌雯</h1>
      <h2>B11313121</h2>
    </div>
    <div class="title-right">
      <p class="subtitle">實境解謎裝置儀表板</p>
    </div>
  </header>

  <section class="panels">
    <!-- 1. 👈 加上 id="panel-latest" -->
    <div class="panel realtime" id="panel-latest">
      <h3>即時數值</h3>
      <div id="latest-values">Loading...</div>
    </div>

    <!-- 2. 👈 加上 id="panel-chart" -->
    <div class="panel charts" id="panel-chart">
      <h3>歷史折線圖</h3>
      <div class="controls">
        <select id="sensor-select">
          <option value="">-- 選擇感測器 --</option>
          {% for s in sensors %}
          <option value="{{ s.id }}">{{ s.name|default:s.topic }}</option>
          {% endfor %}
        </select>
      </div>
      <canvas id="chart" width="800" height="300"></canvas>
    </div>

    <!-- 3. 👈 加上 id="panel-raw" -->
    <div class="panel raw" id="panel-raw">
      <h3>原始資料</h3>
      <table id="raw-table">
        <thead><tr><th>ID</th><th>Topic</th><th>Value</th><th>Timestamp</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- 4. 👈 加上 id="panel-pi" -->
    <div class="panel pi-data" id="panel-pi">
      <h3>Pi 資料（iotsixgroup.pi）</h3>
      <table id="pi-table">
        <thead><tr><th>ID</th><th>event_type</th><th>Timestamp</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <script src="/static/sensors/main.js"></script>
{% endblock %}
