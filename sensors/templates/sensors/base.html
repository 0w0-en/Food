<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IoT 個人專題</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Press+Start+2P&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/sensors/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="bg-art"></div>
    
    <nav class="navbar">
      <div class="nav-left">實境解謎裝置</div>
      <div class="nav-right">
        <a href="https://carpool-diffusion-letdown.ngrok-free.dev" target="_blank">組別總網站</a>
      </div>
    </nav>

    <main class="container">
        
        <div id="panel-latest" class="panel">
            <h2>即時數值</h2>
            <div id="latest-values" class="latest-grid"></div>
        </div>

        <div id="panel-chart" class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>歷史折線圖</h2>
                
                <select id="sensor-select" style="padding: 5px; border-radius: 5px;">
                    <option value="">-- 選擇感測器 --</option>
                    {% for s in sensors %}
                        <option value="{{ s.id }}">{{ s.name|default:s.topic }}</option>
                    {% endfor %}
                </select>
            </div>
      
            <canvas id="sensorChart"></canvas>
        </div>

        <div id="panel-raw" class="panel">
            <h2>原始資料</h2>
            <table id="raw-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Topic</th>
                        <th>Value</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

    </main>

    <script src="/static/sensors/main.js"></script>
</body>
</html>
