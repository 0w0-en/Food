<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IoT 個人專題</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Press+Start+2P&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/sensors/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="bg-art"></div>
    <nav class="navbar">
      <div class="nav-left">
        <!-- 1. 👈 新增漢堡選單按鈕 -->
        <button id="menu-toggle" class="menu-btn">☰</button>
        實境解謎裝置
      </div>
      <div class="nav-right">
        <a href="http://100.97.224.8:8000/">組別總網站</a>
      </div>
    </nav>

    <!-- 2. 👈 新增側邊選單本體 -->
    <div id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h3 id="show-all-btn" style="cursor: pointer;">📊 顯示全部</h3>
        <button id="menu-close" class="close-btn">×</button>
      </div>
      <ul class="sidebar-menu">
        <li data-target="panel-latest">即時數值</li>
        <li data-target="panel-chart">歷史折線圖</li>
        <li data-target="panel-raw">原始資料</li>
        <li data-target="panel-pi">Pi 資料</li>
      </ul>
    </div>

    <main class="container">
      <div class="hero-card">
        <!-- 註：你先前說要把大卡片裝飾拿掉，也可以直接把下面這行 bg-art-inner 刪除 -->
        {% block content %}{% endblock %}
      </div>
    </main>
  </body>
</html>
