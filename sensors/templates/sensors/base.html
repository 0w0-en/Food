<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IoT 個人專題</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/sensors/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="bg-art">
      <!-- Floating jellyfish SVGs -->
      <svg class="jellyfish j1" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden>
        <g fill="none" fill-rule="evenodd">
          <g transform="translate(10,10)">
            <path d="M50 20c20 0 36 12 36 26s-16 26-36 26S14 58 14 44 30 20 50 20z" fill="rgba(140,90,255,0.18)"/>
            <g stroke="rgba(255,255,255,0.12)" stroke-width="2" stroke-linecap="round">
              <path d="M30 72c6 8 12 8 18 0"/>
              <path d="M44 72c6 12 12 12 18 0"/>
              <path d="M58 72c6 8 12 8 18 0"/>
            </g>
          </g>
        </g>
      </svg>

      <svg class="jellyfish j2" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden>
        <g>
          <path d="M30 30c14-6 46-6 60 0s20 28 6 34-46 6-60 0S16 36 30 30z" fill="rgba(255,120,190,0.12)"/>
          <g stroke="rgba(180,220,255,0.12)" stroke-width="1.6" stroke-linecap="round">
            <path d="M40 74c6 10 14 10 20 0"/>
            <path d="M50 78c6 14 14 14 20 0"/>
          </g>
        </g>
      </svg>

      <svg class="jellyfish j3" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden>
        <g>
          <ellipse cx="40" cy="34" rx="28" ry="18" fill="rgba(110,190,255,0.10)"/>
          <g stroke="rgba(255,200,255,0.10)" stroke-width="1.4" stroke-linecap="round">
            <path d="M26 66c6 12 14 12 20 0"/>
            <path d="M34 66c4 10 10 10 16 0"/>
          </g>
        </g>
      </svg>
    </div>
    <nav class="navbar">
      <div class="nav-left">實境解謎裝置</div>
      <div class="nav-right">
        <a href="#">組別總網站</a>
      </div>
    </nav>
    <main class="container">
      <div class="hero-card">
        {% block content %}{% endblock %}
      </div>
    </main>
  </body>
</html>
