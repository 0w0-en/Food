<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>儀表板</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header style="padding: 20px; text-align: center; background: #f9f7ff;">
        <a href="https://carpool-diffusion-letdown.ngrok-free.dev" 
           style="text-decoration: none; color: #4c1d95; font-weight: bold; font-size: 1.2em;">
           ⬅️ 返回組別總網站
        </a>
    </header>

    <div class="dashboard-container">
        <div id="panel-latest" class="panel">
            <h2>即時數值</h2>
            <div id="latest-values" class="latest-grid"></div>
        </div>

        <div id="panel-chart" class="panel">
            <h2>歷史折線圖</h2>
            <canvas id="sensorChart"></canvas>
        </div>

        <div id="panel-raw" class="panel">
            <h2>原始資料</h2>
            <table id="raw-table">
                <thead>
                    <tr><th>ID</th><th>Topic</th><th>Value</th><th>Time</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
